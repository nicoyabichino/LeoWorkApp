<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Profe - Control Total</title>
    
  <link rel="manifest" href="manifest-admin.json?v=12">
    <meta name="theme-color" content="#0b0f1a">
    
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b22; --primary: #3b82f6;
            --success: #238636; --danger: #da3633; --text: #f0f6fc;
            --accent: #8b5cf6; 
            --electric-blue: #00d4ff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 10px; padding-bottom: 50px; }
        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin: 15px 0; }

        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #30363d; position: relative; }
        
        .sesion { border-top: 6px solid var(--accent); }
        .dia-label { position: absolute; top: -15px; left: 15px; background: var(--accent); color: white; padding: 2px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        label { display: block; font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 8px; font-size: 1rem; outline: none; }

        .btn-add-day { background: var(--accent); color: white; width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-add-ex { background: #3e4c5a; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 0.9rem; font-weight: bold; }
        .btn-gen { background: var(--primary); color: white; width: 100%; padding: 18px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; }

        .ex-item { border-left: 3px solid var(--primary); padding: 12px; margin-bottom: 12px; background: #1c2128; border-radius: 0 8px 8px 0; }
        .copy-area { background: #000; color: #22c55e; border: 1px solid var(--success); font-family: monospace; padding: 15px; border-radius: 8px; word-break: break-all; font-size: 0.75rem; margin-top: 10px; }
        
/* Estilo para el Título Grande */
.title-sign { 
    text-align: center; 
    color: #888; 
    font-size: 1.4rem; /* Tamaño grande para el título */
    letter-spacing: 3px; 
    margin-top: 40px; 
    font-weight: bold; 
}

/* Estilo para tu Firma Pequeña */
.footer-sign { 
    text-align: center; 
    color: #444; 
    font-size: 0.8rem; /* Tamaño original para tu marca */
    letter-spacing: 3px; 
    margin-top: 20px; 
    font-weight: bold; 
    padding-bottom: 100px; 
}

/* Reglas comunes para los enlaces y spans dentro de ambos */
.title-sign a, .footer-sign a {
    text-decoration: none;
}

.title-sign span, .footer-sign span { 
    color: #00d4ff;
    text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
    transition: 0.3s;
}

.title-sign span:hover, .footer-sign span:hover {
    text-shadow: 0 0 15px rgba(0, 212, 255, 1);
    color: #ffffff;
}

/* Efecto opcional al pasar el mouse o tocar */
.footer-sign span:hover {
    text-shadow: 0 0 15px rgba(0, 212, 255, 1);
    color: #ffffff;
}
        .brand-link { color: var(--electric-blue); text-decoration: none; }

        #temp-copy { position: absolute; left: -9999px; }
/* Ajuste para que el título no se corte en celulares */
@media (max-width: 400px) {
    .title-sign span {
        display: block; /* Fuerza el salto de línea solo en móviles */
        margin-top: 5px;
    }
}
/* Protector de acceso */
#access-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); z-index: 9999; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    padding: 20px;
}
    </style>
</head>
<body>
<div id="access-screen">
    <footer class="title-sign" style="margin-bottom: 20px;">
        PANEL PROFE <a><span>LEO RODRIGUEZ</span></a>
    </footer>
    <input type="password" id="admin-pass" placeholder="Ingrese Clave de Acceso" 
           style="max-width: 300px; text-align: center; border: 2px solid var(--primary);">
    <button onclick="verificarAcceso()" class="btn-gen" style="max-width: 300px;">ENTRAR AL PANEL</button>
    <p id="error-msg" style="color: var(--danger); font-size: 0.8rem; margin-top: 10px; display: none;">Clave incorrecta. Intente de nuevo.</p>
</div>

<footer class="title-sign">
    PANEL PROFE <a><span>LEO RODRIGUEZ</span></a>
</footer>

<div class="card">
        <label>Nombre del Alumno</label><input type="text" id="alumno-nombre" placeholder="Ej: Juan Pérez">
        <label>Semana #</label><input type="text" id="semana-nro" placeholder="Ej: 1">
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        <button onclick="importarRutina()" style="background: transparent; color: var(--accent); border: 1px dashed var(--accent); width: 100%; padding: 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">
            🔄 MODIFICAR RUTINA EXISTENTE (PEGAR CÓDIGO)
        </button>
    </div>

    <div id="rutina-container"></div>

    <button class="btn-add-day" onclick="agregarSesion()">+ AGREGAR OTRO DÍA</button>
    <button class="btn-gen" onclick="generarLink()">GENERAR CÓDIGO DE RUTINA</button>

 <div id="resultado" style="display:none;" class="card">
        <div style="text-align:center; padding: 10px 0;">
            <div style="font-size: 3rem; margin-bottom: 10px;">✅</div>
            <h2 style="color: var(--success); font-size: 1.2rem; margin-bottom: 5px;">¡RUTINA LISTA!</h2>
            <p style="color: #888; font-size: 0.8rem; margin-bottom: 20px;">El código se generó correctamente para <b><span id="target-alumno"></span></b>.</p>
            
            <label>Vista previa del código:</label>
            <div id="linkFinal" class="copy-area" style="height: 60px; overflow-y: auto; opacity: 0.5; border-style: dashed; margin-bottom: 20px;"></div>
            
            <button onclick="copiarLink(event)" style="background: var(--primary); color: white; width:100%; padding:18px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);">
                📋 COPIAR CÓDIGO PARA ENVIAR
            </button>
        </div>
        <textarea id="temp-copy" style="position: absolute; left: -9999px;"></textarea>
    </div>
<div id="modal-importar" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; padding:20px; flex-direction:column; justify-content:center;">
    <div class="card" style="border: 1px solid var(--primary);">
        <label>PEGÁ TU CÓDIGO AQUÍ:</label>
        <textarea id="input-importar" style="width:100%; height:200px; background:#0d1117; color:white; border:1px solid #30363d; border-radius:8px; padding:10px; font-family:monospace; font-size:0.7rem; margin-bottom:15px;"></textarea>
        
        <button onclick="procesarImportacion()" class="btn-gen">CARGAR RUTINA</button>
        <button onclick="document.getElementById('modal-importar').style.display='none'" style="background:transparent; color:white; border:none; width:100%; margin-top:10px; font-size:0.8rem;">CANCELAR</button>
    </div>
</div>
    <footer class="footer-sign">
    DESARROLLADO POR <a href="https://www.linkedin.com/in/nicolas-yabichino/" target="_blank"><span>NICOYABI</span></a>
</footer>

<script>
    let contadorSesiones = 0;

const DATA_EJERCICIOS = {
    "MOVILIDAD": ["Rotacion de columna", "Movilidad de cadera", "Movilidad de rodilla", "Rotacion de hombros", "Gato malo/bueno", "Otro"],
    "ABDOMEN / CORE": ["Plancha frontal", "Plancha lateral", "Planchas dinámicas", "Crunch", "Oblicuos", "Bicho muerto", "Bird-dog", "Abs wheel (ruedita)", "Abs sovieticas", "Leñador ascendente", "Leñador descendente", "Elevacion de piernas", "Otro"],
    "TREN INF / CUADRICEPS / GEMELOS": ["Sentadilla con barra alta", "Sentadilla con barra baja", "Sentadilla frontal", "Sentadilla en multipower", "Sentadilla hack", "Sentadilla pendular", "Sentadilla goblet", "Sentadilla bulgara (enfoque cuadriceps)", "Prensa bilateral", "Prensa unilateral", "Sillon cuadriceps bilateral", "Sillon cuadriceps unilateral", "Estocada hacia adelante", "Subidas al banco (enfoque cuadriceps)", "Gemelos en prensa", "Gemelos en maquina especifica", "Gemelos con mancuernas", "Gemelos con barra", "Otro"],
    "TREN INF / ISQUIOS / GLUTEOS / ADUCTORES": ["Peso muerto convencional", "Peso muerto rumano", "Peso muerto piernas rigidas", "Peso muerto sumo", "Peso muerto unilateral", "Camilla de isquis bilateral", "Camilla de isquis unilateral", "Aductores en maquina", "Abducciones en maquina", "Patada de gluteo en maquina especifica", "Patada de gluteo en polea", "Hip-trust bilateral", "Hip-trust unilateral", "Sentadilla bulgara (enfoque gluteo)", "Subida al banco (enfoque gluteo)", "Abducciones con banda", "Otro"],
    "PECTORAL": ["Press plano barra", "Press plano mancuerna", "Press plano multipower", "Press inclinado barra", "Press inclinado mancuenra", "Press inclinado multipower", "Press declinado con mancuerna", "Press en polea altura media", "Peck deck", "Apertura con mancuernas", "Flexiones de brazos", "Poleas cruzadas", "Otro"],
    "DORSALES": ["Dominadas supina", "Dominadas pronacion", "Jalon al pecho supino", "Jalon al pecho prono", "Jalon al pecho agarre cerrado", "Remo bajo ancho", "Remo bajo cerrado", "Remo bajo unilateral", "Remo con mancuerna bilateral", "Remo con mancuerna unilateral", "Remo con barra codo abierto", "Remo con barra codo cerrado", "Pullover", "Remo dorian", "Otro"],
    "BICEPS / TRICEPS / DELTOIDES": ["Curl biceps con barra", "Curl biceps con mancuerna", "Curl biceps sentado con mancuerna", "Curl biceps predicador con barra", "Curl biceps predicador con mancuerna", "Curl biceps en polea", "Curl biceps bayessian", "Curl biceps martillo", "Triceps polea alta bilateral", "Triceps polea alta unilateral", "Triceps trasnuca bilateral", "Triceps trasnuca unilateral", "Press frances", "Fondo en paralela", "Press vertical barra", "Press vertical mancuerna", "Vuelo lateral", "Vuelo frontal", "Vuelo posterior", "Peck deck inverso.", "Otro"]
};
function agregarSesion() {
    contadorSesiones++;
    const div = document.createElement('div');
    div.className = 'card sesion';
    div.id = `sesion-${contadorSesiones}`;
    div.innerHTML = `
        <div class="dia-label">DÍA CONFIGURADO</div>
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
            <input type="text" placeholder="Ej: Lunes" class="nombre-sesion" style="width:80%; margin:0; font-weight:bold;">
            <button style="background:var(--danger); border:none; color:white; padding:5px 10px; border-radius:5px;" onclick="this.parentElement.parentElement.remove()">X</button>
        </div>
        <div class="ejercicios-container"></div>
        <button class="btn-add-ex" onclick="agregarEjercicio(${contadorSesiones})">+ Añadir Ejercicio</button>
    `;
    document.getElementById('rutina-container').appendChild(div);
    agregarEjercicio(contadorSesiones);
}

function agregarEjercicio(sId) {
    const container = document.querySelector(`#sesion-${sId} .ejercicios-container`);
    const div = document.createElement('div');
    div.className = 'ex-item';
    
    div.innerHTML = `
        <div style="margin-bottom:10px;">
            <select class="ex-tipo" onchange="cambiarModo(this)" style="background:var(--accent); font-weight:bold; height:35px; padding:5px; border-radius:5px; color:white; width:100%;">
                <option value="normal">EJERCICIO NORMAL</option>
                <option value="superserie">SUPERSERIE (A+B...)</option>
            </select>
        </div>

        <div class="sub-ejercicios-container">
            <div class="sub-ex" style="border-bottom: 1px dashed #444; margin-bottom:10px; padding-bottom:10px;">
                ${crearHtmlCamposEjercicio(false)}
                ${crearHtmlCamposEjercicio(true)} 
            </div>
        </div>
        
        <button class="btn-add-sub" style="display:none; background:#238636; color:white; border:none; padding:8px; border-radius:4px; font-size:0.7rem; margin-bottom:10px; width:100%;" onclick="agregarSubEjercicio(this)">+ Añadir Ejercicio a la Serie</button>

        <div style="background:#111; padding:10px; border-radius:8px; border:1px solid #444; margin-top:10px;">
            <label style="color:var(--primary); font-size:0.7rem;">DESCANSO AL TERMINAR ESTE BLOQUE (segundos)</label>
            <input type="number" class="ex-descanso-final" value="120" style="width:100%; background:#000; color:#fff; border:1px solid #333;">
        </div>

        <textarea class="ex-notas" placeholder="Observaciones generales..." style="width:100%; height:40px; margin-top:5px;"></textarea>
        <button onclick="this.parentElement.remove()" style="color:var(--danger); border:none; background:none; font-size:0.7rem; width:100%; text-align:right; margin-top:5px;">Eliminar Bloque</button>
    `;
    container.appendChild(div);
    div.querySelectorAll('.ex-grupo').forEach(g => actualizarEjercicios(g));
}
function crearHtmlCamposEjercicio(esAlternativo = false) {
    const prefijo = esAlternativo ? 'alt-' : '';
    const label = esAlternativo ? 'ALTERNATIVA (Si no puede el ppal)' : 'EJERCICIO PRINCIPAL';
    const colorBorde = esAlternativo ? '#3b82f6' : '#238636';

    return `
        <div class="${prefijo}campos-container" style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid ${colorBorde}; margin-top: 10px;">
            <div style="color:${colorBorde}; font-size:0.65rem; font-weight:bold; margin-bottom:5px;">${label}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:8px;">
                <div>
                    <label>Grupo</label>
                    <select class="ex-grupo" onchange="actualizarEjercicios(this)">
                        ${Object.keys(DATA_EJERCICIOS).map(g => `<option value="${g}">${g}</option>`).join('')}
                    </select>
                </div>
                <div>
                    <label>Nombre</label>
                    <select class="ex-nombre" onchange="checkOtro(this)"></select>
                    <input type="text" class="ex-nombre-otro" placeholder="Escribir nombre..." style="display:none; margin-top:5px; border-color: var(--accent); background:#111; color:#fff;">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px;">
                <div><label>Sets</label><input type="number" class="ex-series" value="4"></div>
                <div><label>Reps</label><input type="text" class="ex-reps" placeholder="12,10"></div>
                <div><label>Kg</label><input type="text" class="ex-peso" placeholder="50"></div>
                <div><label>Pausa</label><input type="number" class="ex-descanso-especifico" value="90"></div>
            </div>
            <div style="margin-top:5px;"><label>Video (Opcional)</label><input type="text" class="ex-video" placeholder="Link YouTube"></div>
        </div>
    `;
}
function cambiarModo(select) {
    const parent = select.parentElement.parentElement;
    const btnAddSub = parent.querySelector('.btn-add-sub');
    if(select.value === 'superserie') {
        btnAddSub.style.display = 'block';
        parent.style.borderLeft = '4px solid gold';
    } else {
        btnAddSub.style.display = 'none';
        parent.style.borderLeft = '3px solid var(--primary)';
        // Opcional: limpiar los extras si vuelve a normal
    }
}

function agregarSubEjercicio(btn) {
    const container = btn.parentElement.querySelector('.sub-ejercicios-container');
    const firstSub = container.querySelector('.sub-ex');
    const nuevoSub = firstSub.cloneNode(true);
    // Limpiar valores del clon
    nuevoSub.querySelector('.ex-video').value = "";
    container.appendChild(nuevoSub);
}
    function toggleAlternativa(checkbox) {
    const subEx = checkbox.closest('.ex-item').querySelectorAll('.sub-ex');
    subEx.forEach(ex => {
        const panelAlt = ex.querySelector('.alt-campos-container');
        panelAlt.style.display = checkbox.checked ? 'block' : 'none';
    });
}

function checkOtro(select) {
    // Busca el input que está justo al lado (en el mismo div padre)
    const inputOtro = select.parentElement.querySelector('.ex-nombre-otro');
    if (select.value === "OTRO" || select.value === "Otro") {
        inputOtro.style.display = "block";
        inputOtro.focus();
    } else {
        inputOtro.style.display = "none";
    }
}

function actualizarEjercicios(selectGrupo) {
    const grupo = selectGrupo.value;
    const contenedorPadre = selectGrupo.closest('.campos-container') || selectGrupo.closest('.alt-campos-container');
    const selectEx = contenedorPadre.querySelector('.ex-nombre');
    
    let ejercicios = [...(DATA_EJERCICIOS[grupo] || [])];
    
    // Forzamos que siempre exista "Otro" si no está en la lista
    if (!ejercicios.includes("Otro") && !ejercicios.includes("OTRO")) {
        ejercicios.push("Otro");
    }

    selectEx.innerHTML = ejercicios.map(e => `<option value="${e}">${e}</option>`).join('');
    
    // Resetear el input "Otro" por si estaba abierto
    checkOtro(selectEx);
}
function obtenerNombreEjercicio(contenedor) {
    const select = contenedor.querySelector('.ex-nombre');
    const inputOtro = contenedor.querySelector('.ex-nombre-otro');
    if (select.value.toUpperCase() === "OTRO") {
        return inputOtro.value || "Ejercicio sin nombre";
    }
    return select.value;
}
function generarLink() {
    const nombre = document.getElementById('alumno-nombre').value;
    const semana = document.getElementById('semana-nro').value;
    if(!nombre) return alert("Falta nombre del alumno");
    
    const rutina = { alumno: nombre, semana: semana, sesiones: {} };

    document.querySelectorAll('.sesion').forEach((s, idx) => {
        const ejercicios = [];
        
        s.querySelectorAll('.ex-item').forEach(item => {
            const subEjs = [];

            item.querySelectorAll('.sub-ex').forEach(sub => {
                const principalCont = sub.querySelector('.campos-container');
                const altCont = sub.querySelector('.alt-campos-container');

                // Guardamos los datos de ambos (Principal y Alternativo)
                subEjs.push({
                    nombre: obtenerNombreEjercicio(principalCont),
                    grupo: principalCont.querySelector('.ex-grupo').value,
                    series: parseInt(principalCont.querySelector('.ex-series').value) || 0,
                    reps_obj: principalCont.querySelector('.ex-reps').value,
                    peso_obj: principalCont.querySelector('.ex-peso').value,
                    // Usamos el descanso individual de cada uno
                    descanso: parseInt(principalCont.querySelector('.ex-descanso-especifico').value) || 90,
                    video: principalCont.querySelector('.ex-video').value,
                    
                    alternativa: {
                        nombre: obtenerNombreEjercicio(altCont),
                        grupo: altCont.querySelector('.ex-grupo').value,
                        series: parseInt(altCont.querySelector('.ex-series').value) || 0,
                        reps_obj: altCont.querySelector('.ex-reps').value,
                        peso_obj: altCont.querySelector('.ex-peso').value,
                        descanso: parseInt(altCont.querySelector('.ex-descanso-especifico').value) || 90,
                        video: altCont.querySelector('.ex-video').value,
                    },
                    notas: item.querySelector('.ex-notas').value
                });
            });

            // Al final del bloque (ex-item), guardamos el descanso para pasar al siguiente ejercicio
            ejercicios.push({
                sub_ejercicios: subEjs,
                descanso_bloque: parseInt(item.querySelector('.ex-descanso-final').value) || 120
            });
        });

        rutina.sesiones[idx + 1] = {
            nombre: s.querySelector('.nombre-sesion').value || `Día ${idx + 1}`,
            ejercicios: ejercicios
        };
    });

    try {
        const jsonStr = JSON.stringify(rutina);
        const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
        document.getElementById('target-alumno').innerText = nombre.toUpperCase();
        document.getElementById('linkFinal').innerText = base64;
        document.getElementById('resultado').style.display = "block";
        window.scrollTo({ top: document.getElementById('resultado').offsetTop - 20, behavior: 'smooth' });
    } catch(e) {
        console.error("Error al codificar:", e);
        alert("Error al generar el código.");
    }
}
function copiarLink(event) { // <--- Agregamos 'event' aquí
    const text = document.getElementById("linkFinal").innerText;
    const tempInput = document.getElementById("temp-copy");
    tempInput.value = text;
    tempInput.select();
    document.execCommand("copy");
    
    // Feedback visual en el botón
    const btn = event.currentTarget;
    const originalText = btn.innerHTML;
    btn.style.background = "var(--success)";
    btn.innerHTML = "✅ ¡COPIADO CON ÉXITO!";
    
    setTimeout(() => {
        btn.style.background = "var(--primary)";
        btn.innerHTML = originalText;
    }, 2000);
}

    // ÚNICA ADICIÓN EN SCRIPT: REGISTRO DEL SERVICE WORKER
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // Al estar en la misma carpeta, la ruta es directa
        navigator.serviceWorker.register('./sw-admin.js')
            .then(reg => console.log('Admin SW OK'))
            .catch(err => console.log('Error:', err));
    });
}

    agregarSesion();
function verificarAcceso() {
    const pass = document.getElementById('admin-pass').value;
    
    // La clave "Rio2026" escondida en Base64
    const CLAVE_ESCONDIDA = "UmlvMjAyNg=="; 

    // Convertimos lo que ingresó el usuario a Base64 para comparar
    const passCifrado = btoa(unescape(encodeURIComponent(pass)));

    if(passCifrado === CLAVE_ESCONDIDA) {
        document.getElementById('access-screen').style.display = 'none';
        sessionStorage.setItem('admin_auth', 'true');
    } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('admin-pass').value = '';
    }
}

// Al cargar la página, si ya entró antes en esta sesión, ocultamos el bloqueo
window.addEventListener('DOMContentLoaded', () => {
    if(sessionStorage.getItem('admin_auth') === 'true') {
        document.getElementById('access-screen').style.display = 'none';
    }
});
function importarRutina() {
    // En lugar de un prompt, abrimos nuestra propia ventana
    document.getElementById('modal-importar').style.display = 'flex';
    document.getElementById('input-importar').value = ''; // Limpiamos
    document.getElementById('input-importar').focus();
}

function procesarImportacion() {
    let codigo = document.getElementById('input-importar').value;
    if (!codigo) return;

    try {
        codigo = codigo.trim().replace(/\s+/g, '');
        const base64Decoded = atob(codigo);
        const bytes = new Uint8Array(base64Decoded.length);
        for (let i = 0; i < base64Decoded.length; i++) {
            bytes[i] = base64Decoded.charCodeAt(i);
        }
        const decodedText = new TextDecoder().decode(bytes);
        const data = JSON.parse(decodedText);
        
        document.getElementById('rutina-container').innerHTML = "";
        contadorSesiones = 0;
        document.getElementById('alumno-nombre').value = data.alumno || "";
        document.getElementById('semana-nro').value = data.semana || "";

        Object.keys(data.sesiones).forEach(sKey => {
            const s = data.sesiones[sKey];
            agregarSesion(); 
            const sIdActual = contadorSesiones;
            const sesionDiv = document.getElementById(`sesion-${sIdActual}`);
            sesionDiv.querySelector('.nombre-sesion').value = s.nombre;
            sesionDiv.querySelector('.ejercicios-container').innerHTML = "";

            s.ejercicios.forEach(bloque => {
                // 1. Agregamos el bloque base
                agregarEjercicio(sIdActual);
                const exItems = sesionDiv.querySelectorAll('.ex-item');
                const lastExItem = exItems[exItems.length - 1];
                
                // 2. Identificamos si es estructura nueva (sub_ejercicios) o vieja
                const listaSubs = bloque.sub_ejercicios || [bloque];
                
                // 3. Si tiene más de un sub_ejercicio, activamos modo superserie
                if (listaSubs.length > 1) {
                    const selector = lastExItem.querySelector('.ex-tipo');
                    selector.value = 'superserie';
                    cambiarModo(selector);
                    // Creamos los campos necesarios para los ejercicios extra
                    for (let i = 1; i < listaSubs.length; i++) {
                        agregarSubEjercicio(lastExItem.querySelector('.btn-add-sub'));
                    }
                }

                // 4. Llenamos los datos de cada sub-ejercicio
                const subDivs = lastExItem.querySelectorAll('.sub-ex');
                listaSubs.forEach((datosEx, idx) => {
                    const div = subDivs[idx];
                    div.querySelector('.ex-grupo').value = datosEx.grupo || "MOVILIDAD";
                    actualizarEjercicios(div.querySelector('.ex-grupo')); 
                    div.querySelector('.ex-nombre').value = datosEx.nombre || "";
                    div.querySelector('.ex-series').value = datosEx.series || 4;
                    div.querySelector('.ex-reps').value = datosEx.reps_obj || "";
                    div.querySelector('.ex-peso').value = datosEx.peso_obj || "";
                    div.querySelector('.ex-video').value = datosEx.video || "";
                });

                // 5. Datos generales del bloque (descansos y notas)
                lastExItem.querySelector('.ex-descanso').value = bloque.descanso || 90;
                if(lastExItem.querySelector('.ex-descanso-final')) {
                    lastExItem.querySelector('.ex-descanso-final').value = bloque.descanso_final || 120;
                }
                // Las notas suelen estar en el primer sub-ejercicio o en el bloque
                lastExItem.querySelector('.ex-notas').value = listaSubs[0].notas || bloque.notas || "";
            });
        });

        document.getElementById('modal-importar').style.display = 'none';
        alert("¡Rutina importada con éxito!");

    } catch (e) {
        alert("ERROR: El código es inválido o incompatible.");
        console.error(e);
    }
}
</script>
</body>
</html>
